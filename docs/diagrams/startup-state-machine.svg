<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Browser startup state machine</title>
  <desc id="desc">A diagram showing the NiceChunk browser client startup stages from session check through i18n, world config, chain sync, engine setup, chunk generation, and ready state.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#071018"/><stop offset="1" stop-color="#15120d"/></linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2 2 L10 6 L2 10 Z" fill="#8fdcff"/></marker>
    <style>.label{font:800 12px Inter,ui-sans-serif,system-ui,sans-serif;letter-spacing:.16em;fill:#90ff1a}.title{font:850 42px Inter,ui-sans-serif,system-ui,sans-serif;fill:#f3f8ff}.copy{font:500 17px Inter,ui-sans-serif,system-ui,sans-serif;fill:#b8c7d4}.node{fill:rgba(255,255,255,.06);stroke:rgba(255,255,255,.16);stroke-width:1.2;rx:16}.head{font:800 17px Inter,ui-sans-serif,system-ui,sans-serif;fill:#f3f8ff}.small{font:600 12px Inter,ui-sans-serif,system-ui,sans-serif;fill:#bdd0df}.line{stroke:#8fdcff;stroke-width:3;fill:none;marker-end:url(#arrow)}</style>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/><circle cx="220" cy="612" r="280" fill="#00c2ff" opacity=".08"/><circle cx="1040" cy="120" r="260" fill="#83ff00" opacity=".08"/>
  <text x="70" y="78" class="label">CLIENT BOOT SEQUENCE</text>
  <text x="70" y="132" class="title">Startup is staged so failures have a home.</text>
  <text x="70" y="168" class="copy">The loading overlay maps runtime work to explicit stages instead of hiding setup behind a blank canvas.</text>
  <g transform="translate(70 270)"><rect class="node" width="150" height="92"/><text x="24" y="38" class="head">Session</text><text x="24" y="64" class="small">wallet gate</text></g>
  <path class="line" d="M220 316 H270"/>
  <g transform="translate(292 270)"><rect class="node" width="150" height="92"/><text x="24" y="38" class="head">Language</text><text x="24" y="64" class="small">locale cache</text></g>
  <path class="line" d="M442 316 H492"/>
  <g transform="translate(514 270)"><rect class="node" width="150" height="92"/><text x="24" y="38" class="head">World config</text><text x="24" y="64" class="small">chain or cache</text></g>
  <path class="line" d="M664 316 H714"/>
  <g transform="translate(736 270)"><rect class="node" width="150" height="92"/><text x="24" y="38" class="head">Chain sync</text><text x="24" y="64" class="small">resource state</text></g>
  <path class="line" d="M886 316 H936"/>
  <g transform="translate(958 270)"><rect class="node" width="150" height="92"/><text x="24" y="38" class="head">Engine</text><text x="24" y="64" class="small">renderer setup</text></g>
  <path class="line" d="M1033 362 C1010 450 878 494 770 494"/>
  <g transform="translate(566 448)"><rect class="node" width="150" height="92"/><text x="24" y="38" class="head">Chunks</text><text x="24" y="64" class="small">first meshes</text></g>
  <path class="line" d="M566 494 H450"/>
  <g transform="translate(278 448)"><rect class="node" width="150" height="92"/><text x="24" y="38" class="head">Ready</text><text x="24" y="64" class="small">first frame</text></g>
  <text x="318" y="626" class="copy">A visible state machine is easier to debug than a single startup promise with multiple hidden dependencies.</text>
</svg>
